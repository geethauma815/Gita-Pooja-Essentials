services:
  # ── Backend API (Express + MongoDB) ──────────────────────────────────
  - type: web
    name: gita-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (MongoDB Atlas URI)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  # ── Frontend (Next.js) ───────────────────────────────────────────────
  - type: web
    name: gita-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE
        sync: false   # Set to your backend Render URL, e.g. https://gita-backend.onrender.com/api
