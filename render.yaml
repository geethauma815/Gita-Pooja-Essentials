services:
  # ── Backend API (Express + MongoDB) ──────────────────────────────────
  - type: web
    name: gita-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: MONGO_URI
        sync: false   # Set in Render dashboard → your MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard → any long random string
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false   # Set in Render dashboard → your Vercel frontend URL
    healthCheckPath: /health

  # ── Frontend (Next.js) ───────────────────────────────────────────────
  - type: web
    name: gita-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE
        sync: false   # Set in Render dashboard → https://gita-backend.onrender.com/api
